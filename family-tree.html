<html lang="en">

<title>The Orioli–Tavernari Family Tree</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --tavernari: #8b4513;
    --orioli: #1a3a5c;
    --merged: #2c4a2e;
    --historical: #888;
    --node-fill: #f8f6f2;
    --node-stroke: #2c2c2c;
    --edge: #bbb;
    --edge-marriage: #ccc;
    --edge-partner: #aaa;
    --annotation: #999;
    --hover-shadow: 0 4px 24px rgba(0,0,0,0.12);
    --soft-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: #2c2c2c;
    font-family: 'DM Sans', system-ui, sans-serif;
    overflow: hidden;
  }

  /* Header */
  .title-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    padding: 22px 36px 16px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.92) 60%, rgba(255,255,255,0) 100%);
    pointer-events: none;
  }
  .title-bar h1 {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.01em;
    color: #1a1a1a;
  }
  .title-bar .subtitle {
    margin-top: 4px;
    font-family: 'DM Sans', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: #888;
    letter-spacing: 0.02em;
  }

  /* Branch legend */
  .legend {
    position: fixed;
    top: 28px;
    right: 36px;
    z-index: 50;
    display: flex;
    gap: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555;
    pointer-events: none;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 2px;
  }

  /* Viewport / canvas */
  .viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    cursor: grab;
    background: var(--bg);
  }
  .viewport.dragging { cursor: grabbing; }

  .canvas {
    position: absolute;
    width: 4400px;
    height: 2300px;
    top: 0;
    left: 0;
    will-change: transform;
  }

  #tree-svg {
    width: 4400px;
    height: 2300px;
    display: block;
    overflow: visible;
  }

  /* Cards layer — overlays the SVG; SVG holds invisible rects for edge geometry */
  .cards-layer {
    position: absolute;
    top: 0; left: 0;
    width: 4400px;
    height: 2300px;
    pointer-events: none; /* let pan drag pass through; cards re-enable below */
  }

  .node-card {
    position: absolute;
    background: var(--node-fill);
    border: 1px solid var(--node-stroke);
    border-radius: 8px;
    padding: 9px 14px 9px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    box-shadow: var(--soft-shadow);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    pointer-events: auto;
    box-sizing: border-box;
    font-size: 15px;
  }
  .node-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--hover-shadow);
  }
  .node-card .accent {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 4px;
    border-radius: 8px 0 0 8px;
  }
  .node-card.tavernari .accent { background: var(--tavernari); }
  .node-card.orioli    .accent { background: var(--orioli); }
  .node-card.merged    .accent { background: var(--merged); }
  .node-card.historical .accent { background: var(--historical); }

  .node-card.key {
    background: #fffdf7;
    border-color: #1a1a1a;
  }
  .node-card.key .name { font-weight: 700; font-size: 1.0667em; }

  .node-name {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 1em;
    color: #1a1a1a;
    line-height: 1.18;
    letter-spacing: -0.005em;
    white-space: normal;
  }
  .node-dates {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8em;
    color: #888;
    margin-top: 3px;
    letter-spacing: 0.02em;
  }
  .node-loc {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7em;
    font-style: italic;
    margin-top: 2px;
    line-height: 1.25;
    white-space: normal;
    overflow: hidden;
  }
  .node-card.tavernari .node-loc { color: var(--tavernari); }
  .node-card.orioli    .node-loc { color: var(--orioli); }
  .node-card.merged    .node-loc { color: var(--merged); }
  .node-card.historical .node-loc { color: var(--historical); }

  /* Hover card */
  .hover-card {
    position: fixed;
    z-index: 200;
    max-width: 320px;
    padding: 16px 18px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid #eee;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: #333;
    opacity: 0;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .hover-card.visible { opacity: 1; transform: translateY(0); }
  .hover-card .hc-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 2px;
    color: #1a1a1a;
  }
  .hover-card .hc-meta {
    font-size: 11.5px;
    color: #999;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }
  .hover-card .hc-bio { color: #444; }

  /* Annotations */
  .annotation {
    position: absolute;
    z-index: 5;
    max-width: 280px;
    padding: 14px 16px 14px 18px;
    background: #fafaf8;
    border: 1px solid #e8e4dc;
    border-left: 2px solid #c9c2b3;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-style: italic;
    font-size: 12.5px;
    line-height: 1.55;
    color: #555;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  }
  .annotation .ann-tag {
    display: block;
    font-style: normal;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #b29b6e;
    margin-bottom: 6px;
    font-weight: 500;
  }

  /* Hint */
  .hint {
    position: fixed;
    bottom: 36px;
    right: 36px;
    z-index: 50;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.05em;
    text-align: right;
    pointer-events: none;
  }
</style>
</head>

  { id: 'a7',  tag: '17 April 1875 · Rio de Janeiro',
    text: 'Four months after the families arrived, Clementina Tavernari dies of yellow fever in Rio de Janeiro. She is fifty-five. Enrico Secchi continues in her place. A commemorative bust is later erected in Porto Real.',
    pos: { x: 60, y: 1660 } },
  { id: 'a8',  tag: '16 August 1875 · Barra Mansa',
    text: 'Six months after landing in Brazil, Cleonice Tavernari marries Enrico Secchi — the schoolteacher who organized the emigration beside her aunt. The diarist marries the founder’s niece.',
    pos: { x: 2900, y: 840 } },
  { id: 'a9',  tag: '10 January 1877 · The Colony Takes Root',
    text: 'Sugarcane grows on 156 lots. The Engenho Central rises on the Paraíba river. The Associação Italiana Vittorio Emanuele II is founded. Eleuterio Tavernari, Clementina’s nephew, marries Rosa Maretti.',
    pos: { x: 2900, y: 1140 } },
  { id: 'a10', tag: '22 December 1892 · Porto Real',
    text: 'Alessio Orioli — the boy from Sustinente — marries Delmira Fontanesi. Exactly eighteen years to the day since the Anna Pizzorno left Genoa. Both grew up in the colony their parents built.',
    pos: { x: 4100, y: 840 } },
  { id: 'a11', tag: '9 November 1908 · Convergence',
    text: 'Romualdo Orioli — son of the boy from Sustinente — marries Amelia Tavernari — great-niece of the woman who brought his father to Brazil. Two families, one colony, one story.',
    pos: { x: 2900, y: 1440 } },
  { id: 'a12', tag: 'The Colony Lives',
    text: 'Porto Real still carries its name. The Associação Vittorio Emanuele II reaches twenty-two countries on four continents. And somewhere in this chain: a flute, an emperor, a snowstorm in Modena, and a fourteen-year-old boy watching the lights of Genoa disappear.',
    pos: { x: 2900, y: 2000 } },
];

/* ============================================================
   BUILD tikz-svg CONFIG
   ============================================================ */

const HALF_W      = 125;
const HALF_H      = 52;
const KEY_HALF_W  = 135;
const KEY_HALF_H  = 58;

// Build state config for tikz-svg. The SVG nodes are INVISIBLE — they only
// supply geometry so the library can route edges to the right border. The
// visible cards (name + dates + location + accent strip) are HTML divs
// absolutely positioned over the canvas.
const states = {};
for (const [id, p] of Object.entries(PEOPLE)) {
  const isKey = !!p.key;
  states[id] = {
    shape: 'rectangle',
    position: { x: p.pos.x, y: p.pos.y },
    halfWidth:  isKey ? KEY_HALF_W : HALF_W,
    halfHeight: isKey ? KEY_HALF_H : HALF_H,
    label: '',
    fill: 'none',
    stroke: 'none',
    innerSep: 0,
  };
}

const edges = [];

// Marriage edges (dashed, no arrow)
for (const [a, b] of MARRIAGES) {
  edges.push({
    from: a, to: b,
    arrow: 'none',
    dashed: '6 5',
    stroke: '#c8c2b6',
    strokeWidth: 1.2,
  });
}

// Partner edge (dotted)
for (const [a, b] of PARTNERS) {
  edges.push({
    from: a, to: b,
    arrow: 'none',
    dashed: '1.5 4',
    stroke: '#a8a8a8',
    strokeWidth: 1.2,
  });
}

// Parent → child connections as elbow paths (standard family-tree routing):
// short drop from marriage-line midpoint → horizontal trunk → drop into each
// child's north anchor. All children of one joint share the trunk segment.
const paths = [];
for (const j of JOINTS) {
  const [a, b] = j.pair;
  const A = PEOPLE[a], B = PEOPLE[b];
  const halfH_A = A.key ? KEY_HALF_H : HALF_H;
  const parentY = A.pos.y;
  const parentSouth = parentY + halfH_A;
  const midX = (A.pos.x + B.pos.x) / 2;

  const minChildTop = Math.min(...j.children.map(c => {
    const ch = PEOPLE[c];
    return ch.pos.y - (ch.key ? KEY_HALF_H : HALF_H);
  }));
  const trunkY = (parentSouth + minChildTop) / 2;

  for (const childId of j.children) {
    const child = PEOPLE[childId];
    const cHalfH = child.key ? KEY_HALF_H : HALF_H;
    const childNorth = child.pos.y - cHalfH;
    paths.push({
      points: [
        { x: midX,         y: parentSouth },   // marriage-line midpoint (south anchor)
        { x: midX,         y: trunkY      },   // drop to trunk
        { x: child.pos.x,  y: trunkY      },   // across to child column
        { x: child.pos.x,  y: childNorth  },   // drop into child north
      ],
      stroke: '#bcbcbc',
      strokeWidth: 1.2,
    });
  }
}

/* ============================================================
   RENDER
   ============================================================ */

const svg = document.getElementById('tree-svg');

render(svg, {
  states,
  edges,
  paths,
  padding: 0,
});

// Force the canvas-sized viewBox (override library auto-fit). The library
// re-renders after fonts load to fix KaTeX measurement and resets the
// viewBox — observe and re-apply to keep SVG aligned with HTML cards.
const FIXED_VIEWBOX = '0 0 4400 2300';
function pinViewBox() {
  if (svg.getAttribute('viewBox') !== FIXED_VIEWBOX) {
    svg.setAttribute('viewBox', FIXED_VIEWBOX);
  }
  svg.setAttribute('width', '4400');
  svg.setAttribute('height', '2300');
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
}
pinViewBox();
new MutationObserver(pinViewBox).observe(svg, { attributes: true, attributeFilter: ['viewBox', 'width', 'height'] });

/* ============================================================
   PERSON CARDS — absolute-positioned HTML divs over the canvas
   (the SVG holds invisible rects purely for edge geometry)
   ============================================================ */

const cardsLayer = document.getElementById('cards');
const cardEls = {};

for (const [id, p] of Object.entries(PEOPLE)) {
  const isKey = !!p.key;
  const halfW = isKey ? KEY_HALF_W : HALF_W;
  const halfH = isKey ? KEY_HALF_H : HALF_H;

  const card = document.createElement('div');
  card.className = 'node-card ' + p.branch + (isKey ? ' key' : '');
  card.dataset.personId = id;
  card.style.left   = (p.pos.x - halfW) + 'px';
  card.style.top    = (p.pos.y - halfH) + 'px';
  card.style.width  = (halfW * 2) + 'px';
  card.style.height = (halfH * 2) + 'px';

  card.innerHTML = `
    <div class="accent"></div>
    <div class="node-name">${p.name}</div>
    <div class="node-dates">${p.dates}</div>
    <div class="node-loc">${p.loc}</div>
  `;

  cardsLayer.appendChild(card);
  cardEls[id] = card;
}

/* ============================================================
   ANNOTATIONS — DOM elements positioned on the canvas
   ============================================================ */

const canvas = document.getElementById('canvas');

const annotationEls = [];
for (const a of ANNOTATIONS) {
  const el = document.createElement('div');
  el.className = 'annotation';
  el.style.left = a.pos.x + 'px';
  el.style.top  = a.pos.y + 'px';
  el.innerHTML = `<span class="ann-tag">${a.tag}</span>${a.text}`;
  canvas.appendChild(el);
  annotationEls.push({ ...a, el });
}

/* ============================================================
   ANNOTATION PROXIMITY REVEAL — constants + updater
   (declared BEFORE pan code because applyPan() calls updateAnnotations)
   ============================================================ */

const ANN_THRESHOLD = 0.45; // 45% of viewport dims
const MAX_VISIBLE = 3;
const annotationStates = new Map(); // id -> 'visible' | 'hidden'

function updateAnnotations() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const cx = vw / 2;
  const cy = vh / 2;
  const tx = ANN_THRESHOLD * vw;
  const ty = ANN_THRESHOLD * vh;

  const candidates = annotationEls.map(a => {
    const sx = a.pos.x + panX + 140;
    const sy = a.pos.y + panY + 40;
    const dx = (sx - cx) / tx;
    const dy = (sy - cy) / ty;
    const score = dx * dx + dy * dy;
    return { ...a, score, inRange: score <= 1 };
  });

  candidates.sort((a, b) => a.score - b.score);

  const visible = new Set();
  for (const c of candidates) {
    if (c.inRange && visible.size < MAX_VISIBLE) visible.add(c.id);
  }

  for (const a of annotationEls) {
    const want = visible.has(a.id) ? 'visible' : 'hidden';
    if (annotationStates.get(a.id) === want) continue;
    annotationStates.set(a.id, want);
    if (want === 'visible') {
      gsap.fromTo(a.el,
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out' });
    } else {
      gsap.to(a.el, { opacity: 0, y: 8, duration: 0.3, ease: 'power2.in' });
    }
  }
}

/* ============================================================
   PAN / SCROLL
   ============================================================ */

const viewport = document.getElementById('viewport');
const CANVAS_W = 4400, CANVAS_H = 2300;
// title bar overlays the top of the viewport — let users pull the canvas
// down past it (positive panY) so top-row cards aren't trapped under the title.
const TITLE_PAD    = 130;
// also let users overscroll a bit to the left/right and below for breathing room.
const SIDE_PAD     = 80;
const BOTTOM_PAD   = 120;

let panX = 0, panY = 0;          // current canvas translate
const panState = { x: 0, y: 0 }; // for GSAP tweening

function clampPan(x, y) {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const minX = Math.min(SIDE_PAD, vw - CANVAS_W - SIDE_PAD);
  const maxX = SIDE_PAD;
  const minY = Math.min(TITLE_PAD, vh - CANVAS_H - BOTTOM_PAD);
  const maxY = TITLE_PAD;
  return {
    x: Math.max(minX, Math.min(maxX, x)),
    y: Math.max(minY, Math.min(maxY, y)),
  };
}

function applyPan() {
  canvas.style.transform = `translate3d(${panX}px, ${panY}px, 0)`;
  updateAnnotations();
}

function setPan(x, y) {
  const c = clampPan(x, y);
  panX = c.x; panY = c.y;
  applyPan();
}

function tweenPanTo(x, y, duration = 0.6) {
  const target = clampPan(x, y);
  panState.x = panX;
  panState.y = panY;
  gsap.to(panState, {
    x: target.x, y: target.y,
    duration,
    ease: 'power3.out',
    onUpdate: () => {
      panX = panState.x; panY = panState.y;
      applyPan();
    },
  });
}

// Initial pan: center on Clementina
function centerOn(canvasX, canvasY) {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  setPan(vw / 2 - canvasX, vh / 2 - canvasY);
}
centerOn(900, 420);

// Drag to pan
let dragging = false, dragStart = null, dragOrigin = null;
viewport.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragOrigin = { x: panX, y: panY };
  viewport.classList.add('dragging');
  hideHover();
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  setPan(dragOrigin.x + dx, dragOrigin.y + dy);
});
window.addEventListener('mouseup', () => {
  dragging = false;
  viewport.classList.remove('dragging');
});

// Mouse wheel / trackpad: pan in both axes. Hold shift to swap mouse-wheel
// vertical motion to horizontal pan.
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  let dx = e.deltaX;
  let dy = e.deltaY;
  if (e.shiftKey && dx === 0) { dx = dy; dy = 0; }
  setPan(panX - dx, panY - dy);
}, { passive: false });

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft')  tweenPanTo(panX + 400, panY, 0.4);
  if (e.key === 'ArrowRight') tweenPanTo(panX - 400, panY, 0.4);
  if (e.key === 'ArrowUp')    tweenPanTo(panX, panY + 300, 0.4);
  if (e.key === 'ArrowDown')  tweenPanTo(panX, panY - 300, 0.4);
});

// Resize
window.addEventListener('resize', () => setPan(panX, panY));

/* ============================================================
   HOVER CARD
   ============================================================ */

const hoverCard = document.getElementById('hover-card');
let hoverTimeout = null;

function showHover(personId, screenX, screenY) {
  const p = PEOPLE[personId];
  if (!p) return;
  hoverCard.innerHTML = `
    <div class="hc-name">${p.name}</div>
    <div class="hc-meta">${p.dates} · ${p.loc}</div>
    <div class="hc-bio">${p.bio}</div>
  `;
  // Position above the cursor by default; flip below if too high
  const cardW = 320, cardH = 220;
  let left = screenX - cardW / 2;
  let top  = screenY - cardH - 14;
  if (top < 12) top = screenY + 22;
  left = Math.max(12, Math.min(window.innerWidth - cardW - 12, left));
  hoverCard.style.left = left + 'px';
  hoverCard.style.top  = top + 'px';
  hoverCard.classList.add('visible');
}

function hideHover() {
  hoverCard.classList.remove('visible');
}

// Delegate hover events on the canvas
canvas.addEventListener('mouseover', (e) => {
  if (dragging) return;
  const card = e.target.closest('.node-card');
  if (!card) return;
  const id = card.dataset.personId;
  if (!id) return;
  const rect = card.getBoundingClientRect();
  showHover(id, rect.left + rect.width / 2, rect.top);
});

canvas.addEventListener('mouseout', (e) => {
  const card = e.target.closest('.node-card');
  if (!card) return;
  // Hide if mouse leaves the card (and isn't entering a child)
  if (!e.relatedTarget || !e.relatedTarget.closest('.node-card')) {
    hideHover();
  }
});

// Hide hover when starting a drag
viewport.addEventListener('mousedown', hideHover);
</script>

</body>
</html>
