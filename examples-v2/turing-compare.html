<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Turing Machine: TikZ vs tikz-svg</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjs@15.1.1/lib/browser/math.js"></script>
  <script type="importmap">{ "imports": { "mathjs": "./mathjs-shim.js" } }</script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; margin: 0; }
    h1 { font-size: 1.3rem; color: #333; text-align: center; margin-bottom: 2rem; }
    .row { display: flex; gap: 2rem; justify-content: center; align-items: flex-start; }
    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      flex: 1;
      max-width: 500px;
    }
    h2 { font-size: 1rem; color: #555; margin: 0; }
    img { width: 100%; border: 1px solid #eee; background: white; }
    svg { width: 100%; border: 1px solid #eee; background: white; }
  </style>
</head>
<body>
  <h1>Which one is native TikZ?</h1>
  <div class="row">
    <div class="panel">
      <img src="turing-native.png" alt="Diagram A">
    </div>
    <div class="panel">
      <svg id="automaton"></svg>
    </div>
  </div>

  <script type="module">
    import { renderAutomaton } from '../src-v2/automata/automata.js';

    renderAutomaton(document.getElementById('automaton'), {
      nodeDistance: 90,
      onGrid: true,
      stateStyle: {
        radius: 20,
        fill: '#ffffff',
        stroke: '#000000',
        strokeWidth: 1.5,
        fontSize: 13,
        fontFamily: 'serif',
        labelColor: '#000000',
      },
      edgeStyle: {
        stroke: '#000000',
        strokeWidth: 1.5,
      },
      states: {
        A: { initial: true, label: '$q_a$' },
        B: { position: { 'above right': 'A' }, label: '$q_b$' },
        D: { position: { 'below right': 'A' }, label: '$q_d$' },
        C: { position: { 'below right': 'B' }, label: '$q_c$' },
        E: { position: { 'below': 'D' }, label: '$q_e$' },
      },
      edges: [
        { from: 'A', to: 'B', label: '0,1,L' },
        { from: 'A', to: 'C', label: '1,1,R' },
        { from: 'B', to: 'B', label: '1,1,L', loop: 'above' },
        { from: 'B', to: 'C', label: '0,1,L' },
        { from: 'C', to: 'D', label: '0,1,L' },
        { from: 'C', to: 'E', label: '1,0,R', bend: 45 },
        { from: 'D', to: 'D', label: '1,1,R', loop: 'below' },
        { from: 'D', to: 'A', label: '0,1,R' },
        { from: 'E', to: 'A', label: '1,0,R', bend: 45 },
      ],
    });
  </script>
</body>
</html>
